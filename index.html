<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>💪 Железный Трекер</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header-icons">
        <div class="bicep-icon" id="bicepIcon">💪</div>
        <div class="profile-icon" id="profileIcon">👤</div>
    </div>

    <!-- Экран входа -->
    <div id="login-page" class="page active-page">
        <div class="card login-card">
            <h2>🔐 Вход в трекер</h2>
            <input type="email" id="loginEmail" placeholder="Email" value="egorplus98@gmail.com">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
            <p style="font-size:12px; margin-top:12px;">✅ Данные синхронизируются между устройствами</p>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="app-page" class="page">
        <div class="user-status">
            <span id="userEmail"></span>
            <span id="syncStatus" class="sync-status">☁️ синхр.</span>
            <button id="logoutBtn" class="logout-btn">Выйти</button>
        </div>

        <div id="workout-page" class="page active-page">
            <div class="card">
                <div class="date-row">
                    <input type="date" id="workoutDate" class="date-input">
                    <button id="showExercisePickerBtn" class="small-btn">➕ Упр.</button>
                </div>
                <div id="exercisesContainer" class="workout-table"></div>
                <div class="calories-input">
                    <label style="font-size:12px;">🔥 Ккал (можно сумму: 1000+200)</label>
                    <input type="text" id="caloriesInput" placeholder="Например: 1000+200" style="width:100%; padding:10px; background:#1e2332; border-radius:14px; border:1px solid #2f3548; color:white; margin-top:5px;">
                </div>
                <button id="saveAllWorkoutsBtn" style="margin-top: 6px;">💾 Сохранить тренировку</button>
            </div>
        </div>

        <div id="history-page" class="page">
            <div class="card">
                <h2>📜 История тренировок</h2>
                <div id="historyContainer"></div>
            </div>
        </div>

        <div id="stats-page" class="page">
            <div class="card">
                <div class="chart-tabs">
                    <button class="chart-tab-btn active" data-chart="progress">📈 Прогресс (1ПМ)</button>
                    <button class="chart-tab-btn" data-chart="max">🏆 Максимум</button>
                </div>
                <div id="progress-chart-container" class="chart-container active">
                    <select id="chartExerciseSelect" style="width:100%; padding:10px; background:#1e2332; border-radius:14px; margin-bottom:12px;"></select>
                    <div class="compact-chart"><canvas id="progressChart" height="180"></canvas></div>
                </div>
                <div id="max-chart-container" class="chart-container">
                    <div class="compact-chart"><canvas id="maxChart" height="180"></canvas></div>
                </div>
            </div>
            <div class="card">
                <h2>⚖️ Вес тела</h2>
                <div class="compact-chart"><canvas id="weightChart" height="180"></canvas></div>
            </div>
        </div>

        <div id="ai-page" class="page">
            <div class="card">
                <h2>🤖 Передать нейросети</h2>
                <button id="copyJsonBtn">📋 Скопировать данные (JSON)</button>
                <button id="syncNowBtn" class="secondary" style="margin-top:8px;">🔄 Синхронизировать</button>
            </div>
            <div class="card">
                <h3>🧠 Рекомендация</h3>
                <button id="smartAdviceBtn">✨ Получить совет</button>
                <div id="adviceOutput" style="background:#0a0e16; border-radius: 16px; padding: 14px; margin-top: 12px; font-size:13px;"></div>
            </div>
        </div>
    </div>
</div>

<div class="tabs" id="mainTabs">
    <button class="tab-btn active" data-tab="workout">💪 Тренировка</button>
    <button class="tab-btn" data-tab="history">📜 История</button>
    <button class="tab-btn" data-tab="stats">📊 Графики</button>
    <button class="tab-btn" data-tab="ai">🧠 ИИ</button>
</div>

<!-- Модальные окна -->
<div id="profileModal" class="modal-overlay">
    <div class="modal-window">
        <h2>Мои данные</h2>
        <div class="profile-field"><label>Рост (см)</label><input type="number" id="userHeight" placeholder="175"></div>
        <div class="profile-field"><label>Вес (кг)</label><input type="number" id="userWeight" placeholder="75"></div>
        <div class="profile-field"><label>Пол</label><select id="userGender"><option>Мужской</option><option>Женский</option></select></div>
        <div class="profile-field"><label>Возраст</label><input type="number" id="userAge" placeholder="25"></div>
        <h3>📋 Список упражнений</h3>
        <div id="exerciseManageList" class="exercise-list"></div>
        <div style="display:flex; gap:8px; margin-top:10px;">
            <input type="text" id="newExerciseNameInput" placeholder="Новое упражнение" style="flex:1; background:#1e2332; border-radius:14px; padding:8px; border:none; color:white;">
            <button id="addExerciseFromModalBtn" style="width:auto; padding:8px 12px;">➕</button>
        </div>
        <h3 style="margin-top:16px;">⚖️ Запись веса тела</h3>
        <div style="display:flex; gap:8px; margin-bottom:10px;">
            <input type="date" id="weightDateInput" style="flex:1; background:#1e2332; border-radius:14px; padding:8px;">
            <input type="number" id="weightValueInput" placeholder="кг" style="flex:1; background:#1e2332; border-radius:14px; padding:8px;">
            <button id="addWeightBtn" style="width:auto; padding:8px 12px;">+</button>
        </div>
        <div id="weightHistoryList" style="max-height:150px; overflow-y:auto; font-size:12px;"></div>
        <button id="closeProfileBtn" class="secondary" style="margin-top:16px;">Закрыть</button>
    </div>
</div>

<div id="exercisePickerModal" class="modal-overlay">
    <div class="modal-window">
        <h3>➕ Добавить упражнение</h3>
        <div id="exercisePickerList" class="exercise-list-picker"></div>
        <button id="closePickerBtn" class="secondary" style="margin-top:12px;">Отмена</button>
    </div>
</div>

<div id="orderModal" class="modal-overlay">
    <div class="modal-window">
        <h3>🔢 Изменить порядок</h3>
        <p id="orderExerciseName" style="margin-bottom:10px;"></p>
        <div class="number-input-modal">
            <input type="number" id="orderNumberInput" min="1" placeholder="Номер">
            <button id="confirmOrderBtn">Переместить</button>
        </div>
        <button id="closeOrderBtn" class="secondary" style="margin-top:12px;">Отмена</button>
    </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
