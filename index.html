<script type="module">
    // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
    let currentUser = null;
    let foodEntries = [];
    let trainingHistory = [];
    let customExercises = ["Жим лёжа","Присед","Становая тяга","Тяга штанги","Жим стоя"];
    let currentWorkout = {};
    let bodyWeightHistory = [];
    let nextId = 1;
    let workoutExercisesOrder = [];
    let currentOrderExercise = null;
    let currentEditWorkoutId = null;
    
    let productDatabase = {};
    let productList = [];
    
    let charts = {};
    let weightChart = null;
    
    // ---------- ВСПОМОГАТЕЛЬНЫЕ ----------
    function getToday() { return new Date().toISOString().slice(0, 10); }
    function formatDateToDMY(d) { if (!d) return ""; let p = d.split('-'); return p.length === 3 ? `${p[2]}.${p[1]}.${p[0]}` : d; }
    
    // ЕДИНСТВЕННАЯ ПРАВИЛЬНАЯ ФУНКЦИЯ parseCalories
function parseCalories(input) {
    if (!input || input.trim() === "") return null;
    let str = input.toString().trim();
    // Оставляем только цифры, плюсы и минусы
    str = str.replace(/[^0-9+\-]/g, '');
    if (str === "") return null;
    if (str.includes('+')) {
        let parts = str.split('+');
        let total = 0;
        for (let p of parts) {
            let num = parseFloat(p);
            if (!isNaN(num)) total += num;
        }
        return total;
    }
    if (str.includes('-')) {
        let parts = str.split('-');
        let total = parseFloat(parts[0]) || 0;
        for (let i = 1; i < parts.length; i++) {
            let num = parseFloat(parts[i]);
            if (!isNaN(num)) total -= num;
        }
        return total;
    }
    let num = parseFloat(str);
    return isNaN(num) ? null : num;
}

    function findProductInDatabase(query) {
        const lowerQuery = query.toLowerCase().trim();
        for (let [product, nutrition] of Object.entries(productDatabase)) {
            if (product.toLowerCase() === lowerQuery) return { product, nutrition };
        }
        for (let [product, nutrition] of Object.entries(productDatabase)) {
            if (lowerQuery.includes(product.toLowerCase()) || product.toLowerCase().includes(lowerQuery)) {
                return { product, nutrition };
            }
        }
        const words = lowerQuery.split(/\s+/);
        for (let [product, nutrition] of Object.entries(productDatabase)) {
            for (let word of words) {
                if (word.length > 2 && (product.toLowerCase().includes(word) || word.includes(product.toLowerCase()))) {
                    return { product, nutrition };
                }
            }
        }
        return null;
    }

    function updateMaxChart() {
        let ctx = document.getElementById('maxChart')?.getContext('2d');
        if (!ctx) return;
        let last = {};
        trainingHistory.slice().sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(e => { if (!last[e.exercise]) { let s = e.sets[e.sets.length - 1]; last[e.exercise] = { weight: s.weight, weightType: s.weightType, value: s.weightType === 'bw' ? 0 : s.weight }; } });
        let exercises = Object.keys(last);
        if (charts.max) charts.max.destroy();
        if (exercises.length) { charts.max = new Chart(ctx, { type: 'bar', data: { labels: exercises, datasets: [{ label: 'Вес (кг)', data: exercises.map(e => last[e].value), backgroundColor: '#ff7b2c' }] } }); }
        else { ctx.fillStyle = '#1e2332'; ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height); ctx.fillStyle = '#9ba1bc'; ctx.fillText('Нет данных', ctx.canvas.width / 2, ctx.canvas.height / 2); }

    function updateFoodCharts() {
        let grouped = {};
        foodEntries.forEach(f => { if (!grouped[f.date]) grouped[f.date] = { kcal: 0, protein: 0, fat: 0, carbs: 0 }; grouped[f.date].kcal += f.kcal; grouped[f.date].protein += f.protein; grouped[f.date].fat += f.fat; grouped[f.date].carbs += f.carbs; });
        let dates = Object.keys(grouped).sort();
        let labels = dates.map(d => formatDateToDMY(d));
        let kcalData = dates.map(d => grouped[d].kcal);
        let proteinData = dates.map(d => grouped[d].protein);
        let fatData = dates.map(d => grouped[d].fat);
        let carbsData = dates.map(d => grouped[d].carbs);
        if (charts.kcal) charts.kcal.destroy(); if (charts.protein) charts.protein.destroy(); if (charts.fat) charts.fat.destroy(); if (charts.carbs) charts.carbs.destroy(); if (charts.bju) charts.bju.destroy();
        if (labels.length) {
            charts.kcal = new Chart(document.getElementById('kcalChart'), { type: 'line', data: { labels, datasets: [{ label: 'Калории (ккал)', data: kcalData, borderColor: '#ff7b2c', fill: false }] } });
            charts.protein = new Chart(document.getElementById('proteinChart'), { type: 'line', data: { labels, datasets: [{ label: 'Белки (г)', data: proteinData, borderColor: '#2ecc71', fill: false }] } });
            charts.fat = new Chart(document.getElementById('fatChart'), { type: 'line', data: { labels, datasets: [{ label: 'Жиры (г)', data: fatData, borderColor: '#f1c40f', fill: false }] } });
            charts.carbs = new Chart(document.getElementById('carbsChart'), { type: 'line', data: { labels, datasets: [{ label: 'Углеводы (г)', data: carbsData, borderColor: '#3498db', fill: false }] } });
            charts.bju = new Chart(document.getElementById('bjuChart'), { type: 'bar', data: { labels, datasets: [{ label: 'Белки', data: proteinData, backgroundColor: '#2ecc71' }, { label: 'Жиры', data: fatData, backgroundColor: '#f1c40f' }, { label: 'Углеводы', data: carbsData, backgroundColor: '#3498db' }] } });
        }
    }
    function updateWeightChart() {
        let sorted = [...bodyWeightHistory].sort((a, b) => new Date(a.date) - new Date(b.date));
        let ctx = document.getElementById('weightChart')?.getContext('2d');
        if (!ctx) return;
        if (weightChart) weightChart.destroy();
        if (sorted.length) { weightChart = new Chart(ctx, { type: 'line', data: { labels: sorted.map(w => formatDateToDMY(w.date)), datasets: [{ label: 'Вес (кг)', data: sorted.map(w => w.weight), borderColor: '#4c9aff', fill: false }] } }); }
        else { ctx.fillStyle = '#1e2332'; ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height); ctx.fillStyle = '#9ba1bc'; ctx.fillText('Нет данных', ctx.canvas.width / 2, ctx.canvas.height / 2); }
    }
    
    function updateWeightHistoryList() {
        let container = document.getElementById('weightHistoryList');
        if (!container) return;
        container.innerHTML = '';
        [...bodyWeightHistory].sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(w => {
            let div = document.createElement('div');
            div.style.cssText = 'display:flex; justify-content:space-between; align-items:center; padding:6px; border-bottom:1px solid #2a2f40;';
            div.innerHTML = `<span>${formatDateToDMY(w.date)}</span><span>${w.weight} кг</span><button class="round-delete" data-date="${w.date}">✕</button>`;
            container.appendChild(div);
        });
        document.querySelectorAll('#weightHistoryList .round-delete').forEach(btn => btn.addEventListener('click', async () => {
            let d = btn.dataset.date;
            bodyWeightHistory = bodyWeightHistory.filter(w => w.date !== d);
            updateWeightHistoryList(); updateWeightChart(); saveLocal(); await syncToCloud();
        }));
    }
    document.getElementById('addWeightBtn')?.addEventListener('click', async () => {
        let date = document.getElementById('weightDateInput').value;
        let weight = parseFloat(document.getElementById('weightValueInput').value);
        if (date && weight) {
            let existing = bodyWeightHistory.find(w => w.date === date);
            if (existing) existing.weight = weight;
            else bodyWeightHistory.push({ date, weight });
            updateWeightHistoryList(); updateWeightChart(); saveLocal(); await syncToCloud();
            document.getElementById('weightValueInput').value = '';
        } else alert('Введите дату и вес');
    });
    
    // ---------- ИСТОРИЯ ТРЕНИРОВОК ----------
    let openWorkoutDays = new Set();
    
    function toggleWorkoutDay(date) {
        if (openWorkoutDays.has(date)) openWorkoutDays.delete(date);
        else openWorkoutDays.add(date);
        renderWorkoutHistory();
    }
    
    function renderWorkoutHistory() {
        let container = document.getElementById('workout-history-container');
        if (!container) return;
        if (!trainingHistory.length) { container.innerHTML = '<div style="padding:20px;text-align:center;">Нет тренировок</div>'; return; }
        let grouped = {};
        trainingHistory.slice().sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(w => { if (!grouped[w.date]) grouped[w.date] = []; grouped[w.date].push(w); });
        container.innerHTML = '';
        for (let date in grouped) {
            let totalCal = grouped[date].reduce((s, w) => s + (w.calories || 0), 0);
            let isOpen = openWorkoutDays.has(date);
            let dayDiv = document.createElement('div'); dayDiv.className = 'history-day';
            dayDiv.innerHTML = `
                <div class="history-day-header" data-date="${date}">
                    <span>📅 ${formatDateToDMY(date)}</span>
                    <div class="action-buttons">
                        <span style="font-size:12px;">🔥 ${totalCal} ккал</span>
                        <button class="round-edit edit-calories-btn" data-date="${date}">✏️</button>
                        <button class="round-delete delete-day-btn" data-date="${date}">🗑</button>
                        <span class="small-plus" style="padding:2px 8px;">${isOpen ? '▼' : '▶'}</span>
                    </div>
                </div>
                <div class="workout-history-content ${isOpen ? 'active' : ''}" data-date="${date}">
                </div>
            `;
            container.appendChild(dayDiv);
            const contentDiv = dayDiv.querySelector('.workout-history-content');
            grouped[date].forEach(w => {
                let setsHtml = '<div class="history-sets-list">';
                w.sets.forEach(s => { setsHtml += `<div class="history-set-item">▪️ ${s.weightType === 'bw' ? 'Свой вес' : s.weight + ' кг'} × ${s.reps} (💪${s.effort})</div>`; });
                setsHtml += '</div>';
                let exDiv = document.createElement('div'); exDiv.className = 'history-exercise';
                exDiv.innerHTML = `<div style="display:flex;justify-content:space-between;"><b>🏋️ ${w.exercise}</b><div class="action-buttons"><button class="round-delete delete-workout-btn" data-id="${w.id}">🗑</button></div></div>${setsHtml}`;
                contentDiv.appendChild(exDiv);
            });
        }
        
        document.querySelectorAll('.history-day-header').forEach(header => {
            header.addEventListener('click', (e) => {
                if (e.target.classList.contains('edit-calories-btn') || e.target.classList.contains('delete-day-btn') || e.target.classList.contains('delete-workout-btn')) return;
                const date = header.dataset.date;
                toggleWorkoutDay(date);
            });
        });
        
        document.querySelectorAll('.edit-calories-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const date = btn.dataset.date;
                const dayEntries = trainingHistory.filter(w => w.date === date);
                const totalCal = dayEntries.reduce((s, w) => s + (w.calories || 0), 0);
                currentEditWorkoutId = date;
                document.getElementById('editCaloriesInput').value = totalCal || '';
                document.getElementById('editCaloriesModal').style.display = 'flex';
            });
        });
        
        document.querySelectorAll('.delete-day-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const date = btn.dataset.date;
                if (confirm(`Удалить все тренировки за ${formatDateToDMY(date)}?`)) {
                    trainingHistory = trainingHistory.filter(w => w.date !== date);
                    renderWorkoutHistory(); updateProgressChart(); updateMaxChart(); saveLocal(); await syncToCloud();
                }
            });
        });
        
        document.querySelectorAll('.delete-workout-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                if (confirm('Удалить это упражнение из истории?')) {
                    trainingHistory = trainingHistory.filter(w => w.id !== id);
                    renderWorkoutHistory(); updateProgressChart(); updateMaxChart(); saveLocal(); await syncToCloud();
                }
            });
        });
    }
    
    document.getElementById('saveCaloriesBtn')?.addEventListener('click', async () => {
        if (currentEditWorkoutId) {
            const newCalories = parseCalories(document.getElementById('editCaloriesInput').value);
            trainingHistory = trainingHistory.map(w => {
                if (w.date === currentEditWorkoutId) {
                    return { ...w, calories: newCalories };
                }
                return w;
            });
            renderWorkoutHistory(); saveLocal(); await syncToCloud();
            document.getElementById('editCaloriesModal').style.display = 'none';
            currentEditWorkoutId = null;
        }
    });
    document.getElementById('closeCaloriesModal')?.addEventListener('click', () => {
        document.getElementById('editCaloriesModal').style.display = 'none';
    });
    
    function renderFoodHistory() {
        let container = document.getElementById('food-history-container');
        if (!container) return;
        if (!foodEntries.length) { container.innerHTML = '<div style="padding:20px;text-align:center;">Нет записей о еде</div>'; return; }
        let grouped = {};
        foodEntries.slice().sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(f => { if (!grouped[f.date]) grouped[f.date] = []; grouped[f.date].push(f); });
        container.innerHTML = '';
        for (let date in grouped) {
            let dayDiv = document.createElement('div'); dayDiv.className = 'history-day';
                        let totalKcal = grouped[date].reduce((s, f) => s + f.kcal, 0);
            let totalProtein = grouped[date].reduce((s, f) => s + f.protein, 0);
            let totalFat = grouped[date].reduce((s, f) => s + f.fat, 0);
            let totalCarbs = grouped[date].reduce((s, f) => s + f.carbs, 0);
            dayDiv.innerHTML = `<div class="history-day-header"><span>📅 ${formatDateToDMY(date)}</span><span>🔥 ${Math.round(totalKcal)} ккал | Б:${totalProtein.toFixed(1)} Ж:${totalFat.toFixed(1)} У:${totalCarbs.toFixed(1)}</span><button class="round-delete delete-food-day" data-date="${date}">🗑</button></div><div id="food-day-${date.replace(/-/g, '')}"></div>`;
            container.appendChild(dayDiv);
            const dayContainer = dayDiv.querySelector(`#food-day-${date.replace(/-/g, '')}`);
            grouped[date].forEach(f => {
                let fDiv = document.createElement('div'); fDiv.className = 'history-exercise';
                fDiv.innerHTML = `<div style="display:flex;justify-content:space-between;"><b>🍽 ${f.name}</b><button class="round-delete delete-food" data-id="${f.id}">🗑</button></div><div class="history-set-item">${f.weight}г | Б:${f.protein.toFixed(1)} Ж:${f.fat.toFixed(1)} У:${f.carbs.toFixed(1)} — ${Math.round(f.kcal)} ккал</div>`;
                dayContainer.appendChild(fDiv);
            });
        }
        document.querySelectorAll('.delete-food-day').forEach(btn => btn.addEventListener('click', async () => {
            let date = btn.dataset.date;
            if (confirm(`Удалить все записи о еде за ${formatDateToDMY(date)}?`)) {
                foodEntries = foodEntries.filter(f => f.date !== date);
                renderFoodHistory(); renderFoodList(); updateFoodCharts(); saveLocal(); await syncToCloud();
            }
        }));
        document.querySelectorAll('.delete-food').forEach(btn => btn.addEventListener('click', async () => {
            let id = parseInt(btn.dataset.id);
            foodEntries = foodEntries.filter(f => f.id !== id);
            renderFoodHistory(); renderFoodList(); updateFoodCharts(); saveLocal(); await syncToCloud();
        }));
    }
    
    // ---------- ИИ НАСТРОЙКИ ----------
    document.getElementById('copyJsonBtn')?.addEventListener('click', () => {
        const exportData = { foodEntries, trainingHistory, customExercises, bodyWeightHistory, productDatabase };
        navigator.clipboard.writeText(JSON.stringify(exportData, null, 2)).then(() => alert('JSON скопирован'));
    });
    document.getElementById('syncCloudBtn')?.addEventListener('click', async () => { await syncNow(); });
    document.getElementById('smartAdviceBtn')?.addEventListener('click', () => {
        let last = {};
        trainingHistory.slice().sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(w => { if (!last[w.exercise]) last[w.exercise] = w; });
        let text = '📊 Рекомендации:\n';
        for (let ex in last) {
            let w = last[ex];
            let lastSet = w.sets[w.sets.length - 1];
            text += `\n🏋️ ${ex} (${formatDateToDMY(w.date)}): ${lastSet.weightType === 'bw' ? 'Свой вес' : lastSet.weight + ' кг'} × ${lastSet.reps} (💪${lastSet.effort})\n`;
            if (lastSet.reps >= 10) text += `   → Добавь +2.5-5 кг, делай 6-8 повторов\n`;
            else if (lastSet.reps >= 6) text += `   → Можно добавить +2.5 кг или +1 повтор\n`;
            else text += `   → Снизь вес на 5-10%, работай 8-12 повторов\n`;
        }
        document.getElementById('adviceOutput').innerHTML = text || 'Нет данных';
    });

    // ---------- ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ----------
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('#app-page .page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(`${btn.dataset.tab}-page`).classList.add('active-page');
            if (btn.dataset.tab === 'stats') { updateProgressChart(); updateMaxChart(); updateFoodCharts(); }
            if (btn.dataset.tab === 'history') { renderWorkoutHistory(); renderFoodHistory(); }
            if (btn.dataset.tab === 'food') renderFoodList();
        });
    });
    
    document.querySelectorAll('.chart-group-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.chart-group-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let group = btn.dataset.group;
            document.getElementById('train-charts').style.display = group === 'train' ? 'block' : 'none';
            document.getElementById('food-charts').style.display = group === 'food' ? 'block' : 'none';
            if (group === 'train') { updateProgressChart(); updateMaxChart(); }
            else updateFoodCharts();
        });
    });
    
    document.querySelectorAll('.chart-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            let parent = btn.closest('.chart-group');
            parent.querySelectorAll('.chart-tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let chartType = btn.dataset.chart;
            parent.querySelectorAll('.chart-container').forEach(c => c.classList.remove('active'));
            if (chartType === 'progress') parent.querySelector('#progress-chart-container').classList.add('active');
            else if (chartType === 'max') parent.querySelector('#max-chart-container').classList.add('active');
            else if (chartType === 'kcal') parent.querySelector('#kcal-chart-container').classList.add('active');
            else if (chartType === 'protein') parent.querySelector('#protein-chart-container').classList.add('active');
            else if (chartType === 'fat') parent.querySelector('#fat-chart-container').classList.add('active');
            else if (chartType === 'carbs') parent.querySelector('#carbs-chart-container').classList.add('active');
            else if (chartType === 'bju') parent.querySelector('#bju-chart-container').classList.add('active');
        });
    });
    
    document.querySelectorAll('.history-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.history-tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let type = btn.dataset.history;
            document.querySelectorAll('.history-content').forEach(c => c.classList.remove('active'));
            if (type === 'workout') { document.getElementById('workout-history-container').classList.add('active'); renderWorkoutHistory(); }
            else { document.getElementById('food-history-container').classList.add('active'); renderFoodHistory(); }
        });
    });
    
    document.getElementById('chartExerciseSelect')?.addEventListener('change', () => updateProgressChart());

    // ---------- МОДАЛЬНЫЕ ОКНА ----------
    let profileModal = document.getElementById('profileModal');
    document.getElementById('profileIcon')?.addEventListener('click', () => { if (currentUser) profileModal.style.display = 'flex'; });
    document.getElementById('closeProfileBtn')?.addEventListener('click', () => profileModal.style.display = 'none');
    profileModal?.addEventListener('click', (e) => { if (e.target === profileModal) profileModal.style.display = 'none'; });
    document.getElementById('exercisePickerModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('exercisePickerModal')) document.getElementById('exercisePickerModal').style.display = 'none'; });
    document.getElementById('addFoodModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('addFoodModal')) document.getElementById('addFoodModal').style.display = 'none'; });
    document.getElementById('orderModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('orderModal')) document.getElementById('orderModal').style.display = 'none'; });
    document.getElementById('weightModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('weightModal')) document.getElementById('weightModal').style.display = 'none'; });
    document.getElementById('productManagerModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('productManagerModal')) document.getElementById('productManagerModal').style.display = 'none'; });
    document.getElementById('editCaloriesModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('editCaloriesModal')) document.getElementById('editCaloriesModal').style.display = 'none'; });

    // ---------- АВТОРИЗАЦИЯ ----------
    async function handleLogin(email, password) {
        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            currentUser = userCredential.user;
            document.getElementById('login-page').classList.remove('active-page');
            document.getElementById('app-page').classList.add('active-page');
            document.getElementById('mainTabs').style.display = 'flex';
            document.getElementById('userEmail').innerText = currentUser.email;
            await loadProductDatabase();
            await loadFromCloud();
            renderAll();
            document.getElementById('workoutDate').value = getToday();
            document.getElementById('foodDate').value = getToday();
        } catch (error) {
            alert('Ошибка входа: ' + error.message);
        }
    }

    document.getElementById('loginBtn')?.addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (email && password) handleLogin(email, password);
        else alert('Введите email и пароль');
    });

    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        await signOut(auth);
        currentUser = null;
        document.getElementById('login-page').classList.add('active-page');
        document.getElementById('app-page').classList.remove('active-page');
        document.getElementById('mainTabs').style.display = 'none';
    });

    onAuthStateChanged(auth, (user) => {
        if (user && !currentUser) {
            currentUser = user;
            document.getElementById('login-page').classList.remove('active-page');
            document.getElementById('app-page').classList.add('active-page');
            document.getElementById('mainTabs').style.display = 'flex';
            document.getElementById('userEmail').innerText = currentUser.email;
            loadProductDatabase().then(() => {
                loadFromCloud().then(() => {
                    renderAll();
                    document.getElementById('workoutDate').value = getToday();
                    document.getElementById('foodDate').value = getToday();
                });
            });
        }
    });

    document.getElementById('bicepIcon')?.addEventListener('click', () => {
        let icon = document.getElementById('bicepIcon');
        icon.style.animation = 'none';
        setTimeout(() => icon.style.animation = 'flexBicep 2s ease-in-out infinite', 10);
    });

    function renderAll() {
        renderExercises();
        renderFoodList();
        renderWorkoutHistory();
        renderFoodHistory();
        updateProgressChart();
        updateMaxChart();
        updateFoodCharts();
        updateWeightChart();
        updateWeightHistoryList();
    }

    // ---------- ЗАПУСК ----------
    loadLocal();
    document.getElementById('mainTabs').style.display = 'none';
    document.getElementById('foodDate').value = getToday();
    document.getElementById('workoutDate').value = getToday();
    updateWeightChart();
</script>
<script>
    // Отладка Firebase на телефоне
   <script>
    // Отладка Firebase на телефоне (безопасный код)
    setTimeout(async () => {
        try {
            if (window.auth && window.db) {
                const user = window.auth.currentUser;
                if (user) {
                    alert(`✅ Авторизован: ${user.email}`);
                } else {
                    alert('❌ Не авторизован! Войдите в аккаунт');
                }
            } else {
                alert('❌ Firebase не инициализирован!');
            }
        } catch(e) {
            console.log('Debug error:', e);
        }
    }, 3000);
</script>
